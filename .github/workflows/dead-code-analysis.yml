name: Dead Code Analysis

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  dead-code-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install PMD
        run: |
          PMD_VERSION="7.7.0"
          wget -q "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip"
          unzip -q "pmd-dist-${PMD_VERSION}-bin.zip"
          echo "$PWD/pmd-bin-${PMD_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Run PMD dead code analysis
        id: pmd
        run: |
          pmd check \
            -d src/main/java \
            -R category/java/bestpractices.xml/UnusedPrivateMethod,category/java/bestpractices.xml/UnusedPrivateField,category/java/bestpractices.xml/UnusedLocalVariable,category/java/bestpractices.xml/UnusedFormalParameter,category/java/codestyle.xml/UnnecessaryImport,category/java/design.xml/UselessOverridingMethod \
            -f json \
            -r pmd-report.json \
            --no-fail-on-violation

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh label create "dead-code" --description "Dead or unused code" --color "D93F0B" --force
          gh label create "automated" --description "Created by automation" --color "0E8A16" --force
          gh label create "cleanup" --description "Code cleanup and maintenance" --color "FBCA04" --force

      - name: Create issues from PMD report
        id: create-issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('pmd-report.json')) {
              console.log('No PMD report generated.');
              core.setOutput('issue_numbers', '');
              return;
            }
            const report = JSON.parse(fs.readFileSync('pmd-report.json', 'utf8'));
            const violations = [];
            for (const file of (report.files || [])) {
              for (const v of (file.violations || [])) {
                violations.push({
                  file: file.filename.replace(/^.*\/src\//, 'src/'),
                  rule: v.rule,
                  description: v.description,
                  beginline: v.beginline,
                  endline: v.endline
                });
              }
            }
            if (violations.length === 0) {
              console.log('No dead code violations found.');
              core.setOutput('issue_numbers', '');
              return;
            }
            // Group by rule
            const byRule = {};
            for (const v of violations) {
              (byRule[v.rule] = byRule[v.rule] || []).push(v);
            }
            const issueNumbers = [];
            for (const [rule, items] of Object.entries(byRule)) {
              const title = `[Dead Code] ${rule} violations detected`;
              // Check for existing open issue
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'dead-code,automated',
                state: 'open'
              });
              if (existing.data.some(i => i.title === title)) {
                console.log(`Issue already exists for rule: ${rule}, skipping.`);
                continue;
              }
              // Build table
              let table = '| File | Line(s) | Description |\n|------|---------|-------------|\n';
              for (const item of items) {
                const lines = item.beginline === item.endline ? `L${item.beginline}` : `L${item.beginline}-L${item.endline}`;
                table += `| \`${item.file}\` | ${lines} | ${item.description} |\n`;
              }
              const body = [
                `## Dead Code: ${rule}`,
                '',
                'Automated scan found the following violations.',
                '',
                table,
                '',
                '### Remediation',
                '- Review each finding and remove if confirmed unused',
                '- Run tests after removal to verify no breakage',
                '',
                `> This issue was auto-generated by the Dead Code Analysis workflow on ${new Date().toISOString().split('T')[0]}.`,
              ].join('\n');
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dead-code', 'automated', 'cleanup'],
              });
              console.log(`Created issue #${issue.data.number} for rule: ${rule}`);
              issueNumbers.push(issue.data.number);
            }
            core.setOutput('issue_numbers', issueNumbers.join(','));

      - name: Assign Copilot to issues
        if: steps.create-issues.outputs.issue_numbers != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          IFS=',' read -ra ISSUES <<< "${{ steps.create-issues.outputs.issue_numbers }}"
          for ISSUE_NUMBER in "${ISSUES[@]}"; do
            ASSIGNED=false
            for ASSIGNEE in "copilot-swe-agent[bot]" "copilot-swe-agent" "Copilot" "copilot"; do
              echo "Trying assignee: $ASSIGNEE for issue #$ISSUE_NUMBER"
              gh api "repos/$REPO/issues/$ISSUE_NUMBER/assignees" \
                --method POST \
                --input - <<< "{\"assignees\":[\"$ASSIGNEE\"]}" 2>&1 || true
              CURRENT=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '[.assignees[].login] | join(",")')
              if echo "$CURRENT" | grep -qi "copilot"; then
                echo "Assigned $ASSIGNEE to issue #$ISSUE_NUMBER (current: $CURRENT)"
                ASSIGNED=true
                break
              else
                echo "  Not assigned (current: $CURRENT)"
              fi
            done
            if [[ "$ASSIGNED" != "true" ]]; then
              echo "::warning::Could not auto-assign Copilot to issue #$ISSUE_NUMBER — assign manually from the UI"
            fi
          done
